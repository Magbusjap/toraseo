<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="400" height="440" role="img">
  <title>ToraSEO chibi tiger — neutral pose</title>
  <desc>Chibi tiger mascot in neutral pose with stylized brushstroke stripes, amber gradient eyes and soft outline.</desc>

  <defs>
    <radialGradient id="eyeGrad" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#FFD27A"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="0.5" cy="0.4" r="0.8">
      <stop offset="0%" stop-color="#FF8555"/>
      <stop offset="100%" stop-color="#E85A28"/>
    </radialGradient>
  </defs>

  <g transform="translate(40, 20)">
    <!-- ground shadow -->
    <ellipse cx="60" cy="180" rx="42" ry="6" fill="#1A1A1A" opacity="0.15"/>

    <!-- body parts with outline -->
    <g stroke="#2A1810" stroke-width="2" stroke-linejoin="round">
      <ellipse cx="60" cy="120" rx="42" ry="35" fill="url(#bodyGrad)"/>
      <ellipse cx="42" cy="148" rx="10" ry="8" fill="url(#bodyGrad)"/>
      <ellipse cx="78" cy="148" rx="10" ry="8" fill="url(#bodyGrad)"/>
      <ellipse cx="22" cy="115" rx="9" ry="14" fill="url(#bodyGrad)"/>
      <ellipse cx="98" cy="115" rx="9" ry="14" fill="url(#bodyGrad)"/>
    </g>

    <!-- tail: dark base + orange overlay -->
    <path d="M 100 130 Q 130 125 125 100" stroke="#2A1810" stroke-width="13" fill="none" stroke-linecap="round"/>
    <path d="M 100 130 Q 130 125 125 100" stroke="#FF6B35" stroke-width="10" fill="none" stroke-linecap="round"/>

    <!-- head with outline -->
    <g stroke="#2A1810" stroke-width="2" stroke-linejoin="round">
      <circle cx="60" cy="62" r="48" fill="url(#bodyGrad)"/>
      <ellipse cx="28" cy="28" rx="10" ry="13" fill="url(#bodyGrad)" transform="rotate(-25 28 28)"/>
      <ellipse cx="92" cy="28" rx="10" ry="13" fill="url(#bodyGrad)" transform="rotate(25 92 28)"/>
    </g>

    <!-- belly + face white -->
    <ellipse cx="60" cy="125" rx="32" ry="22" fill="#FFFFFF"/>
    <ellipse cx="60" cy="72" rx="32" ry="26" fill="#FFFFFF"/>

    <!-- ear inner -->
    <ellipse cx="28" cy="30" rx="5" ry="7" fill="#FFB8A0" transform="rotate(-25 28 30)"/>
    <ellipse cx="92" cy="30" rx="5" ry="7" fill="#FFB8A0" transform="rotate(25 92 30)"/>

    <!-- stylized brushstroke stripes (head top) -->
    <path d="M 22 18 Q 28 8 36 14 Q 30 22 22 18 Z" fill="#1A0F08"/>
    <path d="M 50 8 Q 60 0 70 8 Q 60 16 50 8 Z" fill="#1A0F08"/>
    <path d="M 84 14 Q 92 8 98 18 Q 90 22 84 14 Z" fill="#1A0F08"/>

    <!-- stripes (head sides) -->
    <path d="M 18 38 Q 14 50 22 60 Q 28 50 18 38 Z" fill="#1A0F08"/>
    <path d="M 102 38 Q 106 50 98 60 Q 92 50 102 38 Z" fill="#1A0F08"/>

    <!-- stripes (forehead) -->
    <path d="M 50 28 Q 54 36 50 44 Q 46 36 50 28 Z" fill="#1A0F08"/>
    <path d="M 70 28 Q 66 36 70 44 Q 74 36 70 28 Z" fill="#1A0F08"/>

    <!-- stripes (body sides) -->
    <path d="M 18 100 Q 14 115 22 128 Q 28 115 18 100 Z" fill="#1A0F08"/>
    <path d="M 102 100 Q 106 115 98 128 Q 92 115 102 100 Z" fill="#1A0F08"/>
    <path d="M 32 105 Q 28 118 36 128 L 32 105 Z" fill="#1A0F08"/>
    <path d="M 88 105 Q 92 118 84 128 L 88 105 Z" fill="#1A0F08"/>

    <!-- eyes: outer ring + amber iris + dark pupil + 2 highlights -->
    <ellipse cx="44" cy="65" rx="10" ry="11" fill="url(#eyeGrad)" stroke="#2A1810" stroke-width="1.5"/>
    <ellipse cx="76" cy="65" rx="10" ry="11" fill="url(#eyeGrad)" stroke="#2A1810" stroke-width="1.5"/>
    <ellipse cx="44" cy="67" rx="5" ry="6" fill="#1A0F08"/>
    <ellipse cx="76" cy="67" rx="5" ry="6" fill="#1A0F08"/>
    <circle cx="46" cy="63" r="2.5" fill="#FFFFFF"/>
    <circle cx="78" cy="63" r="2.5" fill="#FFFFFF"/>
    <circle cx="42" cy="68" r="1" fill="#FFFFFF"/>
    <circle cx="74" cy="68" r="1" fill="#FFFFFF"/>

    <!-- nose -->
    <ellipse cx="60" cy="80" rx="4" ry="3" fill="#1A0F08"/>

    <!-- mouth -->
    <path d="M 60 84 Q 55 90 50 88" stroke="#2A1810" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 60 84 Q 65 90 70 88" stroke="#2A1810" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
