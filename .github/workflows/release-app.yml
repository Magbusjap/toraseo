name: Release Desktop App

# Builds and publishes the ToraSEO desktop app to GitHub Releases when a
# clean version tag is pushed (e.g. v0.0.8, v0.1.0, v1.0.0).
#
# Starting with App 0.0.8, this workflow owns the public release asset
# list for the whole desktop distribution:
#   - app installer / updater assets from electron-builder
#   - Claude Bridge Instructions ZIP
#   - Codex Workflow Instructions ZIP
#
# The instruction packages remain buildable as standalone components via
# scripts/ and their manual packaging workflows, but public users should
# see one GitHub release entry for a given app version.
#
# IMPORTANT: tag pattern is plain `v*` (no suffix). This matches what
# electron-builder + electron-updater expect — the tool reads
# `version` from app/package.json and creates/updates a release with
# tag `v{version}`. If we tagged `v0.0.3-app`, electron-builder would
# silently create a *parallel* release `v0.0.3` and our tag-triggered
# workflow would produce an empty orphan release.
#
# electron-builder reads "publish.provider: github" from
# app/package.json build config and uploads the .exe / .dmg /
# .AppImage artifacts plus the latest.yml manifest that auto-update
# consumers (electron-updater in the running app) read to detect new
# versions.
on:
  push:
    tags:
      - "v*"
      - "!skill-v*" # historical package tag namespace, not an app release

permissions:
  contents: write

jobs:
  build:
    strategy:
      # Don't cancel other platforms if one fails — useful when, e.g.,
      # the Mac runner has a transient outage.
      fail-fast: false
      matrix:
        # Windows is the primary target. macOS and Linux are commented
        # out for the alpha phase — uncomment when those platforms are
        # ready to be tested.
        os: [windows-latest]
        # os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies (workspaces)
        # Install at the repo root because the project uses npm
        # workspaces (root package.json declares core/, mcp/, app/).
        # This installs all workspace deps and creates symlinks.
        run: npm ci

      - name: Build core
        run: npm run build --workspace=@toraseo/core

      - name: Build instruction package ZIPs
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          ./scripts/build-skill.ps1 $env:GITHUB_REF_NAME
          ./scripts/build-codex-workflow.ps1 $env:GITHUB_REF_NAME
          Get-ChildItem "toraseo-claude-bridge-instructions-$env:GITHUB_REF_NAME.zip", "toraseo-codex-workflow-$env:GITHUB_REF_NAME.zip" |
            Format-Table Name, Length

      - name: Build app and publish to GitHub Releases
        # GH_TOKEN is the auto-injected token; electron-builder uses
        # it via "publish: github" in app/package.json to create or
        # update the release for this tag.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release --workspace=@toraseo/app

      - name: Attach instruction ZIPs to the app release
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            toraseo-claude-bridge-instructions-${{ github.ref_name }}.zip
            toraseo-codex-workflow-${{ github.ref_name }}.zip
