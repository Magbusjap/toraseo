name: Package Codex Workflow Instructions

# Manual packaging workflow for the Codex Workflow Instructions ZIP.
#
# Public release attachment moved to release-app.yml in App 0.0.8 so
# users see one unified GitHub release asset list. This workflow remains
# available when maintainers need a standalone package artifact for QA,
# support, or pre-release validation.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version suffix for the ZIP filename"
        required: false
        default: "dev"

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the commit
        uses: actions/checkout@v4

      - name: Verify Codex workflow structure
        run: |
          test -f toraseo-codex-workflow/SKILL.md || { echo "toraseo-codex-workflow/SKILL.md missing"; exit 1; }
          grep -q "^name:" toraseo-codex-workflow/SKILL.md || { echo "name: field missing"; exit 1; }
          grep -q "^description:" toraseo-codex-workflow/SKILL.md || { echo "description: field missing"; exit 1; }

      - name: Compute zip name
        id: zipname
        run: |
          VERSION="${{ inputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "filename=toraseo-codex-workflow-$VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Build Codex workflow ZIP
        run: |
          zip -r ${{ steps.zipname.outputs.filename }} toraseo-codex-workflow
          unzip -l ${{ steps.zipname.outputs.filename }}

      - name: Upload standalone package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zipname.outputs.filename }}
          path: ${{ steps.zipname.outputs.filename }}
          if-no-files-found: error
