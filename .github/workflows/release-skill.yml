name: Package Claude Bridge Instructions

# Manual packaging workflow for the Claude Bridge Instructions ZIP.
#
# Public release attachment moved to release-app.yml in App 0.0.8 so
# users see one unified GitHub release asset list. This workflow remains
# available when maintainers need a standalone package artifact for QA,
# support, or pre-release validation.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version suffix for the ZIP filename"
        required: false
        default: "dev"

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the commit
        uses: actions/checkout@v4

      - name: Verify Claude instructions structure
        run: |
          test -f claude-bridge-instructions/SKILL.md || { echo "claude-bridge-instructions/SKILL.md missing"; exit 1; }
          grep -q "^name:" claude-bridge-instructions/SKILL.md || { echo "name: field missing"; exit 1; }
          grep -q "^description:" claude-bridge-instructions/SKILL.md || { echo "description: field missing"; exit 1; }

      - name: Compute zip name
        id: zipname
        run: |
          VERSION="${{ inputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "filename=toraseo-claude-bridge-instructions-$VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Build Claude instructions ZIP
        run: |
          mkdir -p staging/toraseo
          cp -r claude-bridge-instructions/. staging/toraseo/
          cd staging
          zip -r ../${{ steps.zipname.outputs.filename }} toraseo
          cd ..
          unzip -l ${{ steps.zipname.outputs.filename }}

      - name: Upload standalone package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zipname.outputs.filename }}
          path: ${{ steps.zipname.outputs.filename }}
          if-no-files-found: error
